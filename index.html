<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Belajar Bahasa Inggris</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;--purple-dark:#3C3489;
  --green-bg:#EAF3DE;--green-txt:#27500A;--green-bdr:#97C459;
  --red-bg:#FCEBEB;--red-txt:#791F1F;--red-bdr:#F09595;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --bg:#fff;--bg2:#f5f5f3;--bg3:#ebebeb;
  --border:#e0e0e0;--border2:#ccc;
  --radius:10px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0eee8;min-height:100vh;display:flex;justify-content:center;padding:0 0 32px}
.app{width:100%;max-width:420px;background:var(--bg);min-height:100vh}
.hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:20}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr h1{font-size:17px;font-weight:600;color:var(--text)}
.score-pill{background:var(--purple-light);color:var(--purple-dark);font-size:13px;font-weight:600;padding:4px 13px;border-radius:99px}
.cat-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
.cat-scroll::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 13px;border-radius:99px;font-size:12px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap;font-weight:500}
.chip.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.tab{padding:11px 0;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent}
.tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.body{padding:14px 16px}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mode-btn{padding:9px 0;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2)}
.mode-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px}
.prog-track{height:5px;background:var(--bg3);border-radius:99px;margin-bottom:14px}
.prog-fill{height:5px;border-radius:99px;background:var(--purple);transition:width .3s}
.flashcard{perspective:1000px;height:230px;cursor:pointer;margin-bottom:14px}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius-lg);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px}
.fc-front{background:var(--bg)}
.fc-back{background:var(--purple);transform:rotateY(180deg)}
.fc-emoji{font-size:44px;line-height:1}
.fc-word{font-size:26px;font-weight:700;color:var(--text);text-align:center}
.fc-pron{font-size:13px;color:var(--text3);font-style:italic}
.fc-hint{font-size:12px;color:var(--text3)}
.fc-back .fc-id{font-size:22px;font-weight:600;color:#fff;text-align:center}
.fc-back .fc-ex{font-size:13px;color:var(--purple-mid);text-align:center;margin-top:4px;line-height:1.5}
.fc-back .fc-hint{color:var(--purple-mid)}
.nav-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.nav-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text2);flex-shrink:0}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.act-row{display:flex;gap:9px;flex:1}
.act-btn{flex:1;padding:11px 0;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;border:1px solid var(--border)}
.btn-know{background:var(--green-bg);color:var(--green-txt);border-color:var(--green-bdr)}
.btn-review{background:var(--red-bg);color:var(--red-txt);border-color:var(--red-bdr)}
.fc-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fc-stat{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.fc-stat-lbl{font-size:11px;color:var(--text3);margin-bottom:2px}
.fc-stat-val{font-size:22px;font-weight:700;color:var(--text)}
.done-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px 20px;text-align:center}
.done-emoji{font-size:54px;margin-bottom:14px}
.done-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.done-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:18px}
.restart-btn{padding:12px 28px;border-radius:var(--radius);background:var(--purple);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:9px 10px;text-align:center}
.stat-lbl{font-size:11px;color:var(--text3);margin-bottom:2px}
.stat-val{font-size:20px;font-weight:700;color:var(--text)}
.stat-val.g{color:#3B6D11}
.stat-val.r{color:#A32D2D}
.q-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 16px;margin-bottom:13px}
.q-meta{font-size:11px;color:var(--text3);margin-bottom:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.q-badge{background:var(--purple-light);color:var(--purple-dark);font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
.q-emoji{font-size:40px;display:block;text-align:center;margin:10px 0 6px}
.q-word{font-size:18px;font-weight:700;color:var(--text);text-align:center;display:block}
.q-pron{font-size:12px;color:var(--text3);text-align:center;margin-top:3px;font-style:italic;display:block}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.opt{padding:14px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;text-align:center;line-height:1.3;min-height:54px;display:flex;align-items:center;justify-content:center}
.opt.correct{background:var(--green-bg);border-color:var(--green-bdr);color:var(--green-txt)}
.opt.wrong{background:var(--red-bg);border-color:var(--red-bdr);color:var(--red-txt)}
.opt.reveal{background:var(--green-bg);border-color:var(--green-bdr);color:var(--green-txt)}
.opt.disabled{pointer-events:none}
.feedback{border-radius:var(--radius);padding:12px 14px;margin-bottom:11px;font-size:14px;line-height:1.6}
.feedback.correct{background:var(--green-bg);color:var(--green-txt)}
.feedback.wrong{background:var(--red-bg);color:var(--red-txt)}
.next-btn{width:100%;padding:13px;border-radius:var(--radius);background:var(--purple);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer}
.result-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:30px 20px;text-align:center}
.res-emoji{font-size:56px;margin-bottom:14px}
.res-title{font-size:21px;font-weight:700;color:var(--text);margin-bottom:6px}
.res-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.res-score{font-size:48px;font-weight:700;color:var(--purple);margin-bottom:3px}
.res-detail{font-size:13px;color:var(--text3);margin-bottom:18px}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.res-restart{width:100%;padding:13px;border-radius:var(--radius);background:var(--purple);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-top">
    <h1>🇬🇧 Belajar Bahasa Inggris</h1>
    <span class="score-pill" id="scorePill">Skor: 0</span>
  </div>
  <div class="cat-scroll" id="catScroll"></div>
</div>
<div class="tabs">

  <button class="tab" id="tabQZ" onclick="switchTab('quiz')"><i class="ti ti-target"></i> Kuis</button>
</div>
<div class="body" id="mainBody"></div>
</div>

const CATS=Object.keys(ALL);
let cat=CATS[0],activeTab='flashcard',totalScore=0;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function updateScorePill(){document.getElementById('scorePill').textContent='Skor: '+totalScore}
function renderCats(){
  const el=document.getElementById('catScroll');el.innerHTML='';
  CATS.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='chip'+(c===cat?' active':'');
    btn.textContent=c;
    btn.onclick=()=>{cat=c;renderCats();if(activeTab==='flashcard')startFlashcard();else startQuiz()};
    el.appendChild(btn);
  });
}
function switchTab(t){
  activeTab=t;
  document.getElementById('tabFC').classList.toggle('active',t==='flashcard');
  document.getElementById('tabQZ').classList.toggle('active',t==='quiz');
  if(t==='flashcard')startFlashcard();else startQuiz();
}

/* FLASHCARD */
let fcCards=[],fcIdx=0,fcFlipped=false,fcKnow=0,fcReview=0;
function startFlashcard(){fcCards=shuffle([...ALL[cat]]);fcIdx=0;fcFlipped=false;fcKnow=0;fcReview=0;renderFC()}
function renderFC(){
  const body=document.getElementById('mainBody');
  if(fcIdx>=fcCards.length){
    body.innerHTML=`<div class="mode-row"><button class="mode-btn active" onclick="startFlashcard()"><i class="ti ti-refresh"></i> Ulangi</button><button class="mode-btn" onclick="switchTab('quiz')"><i class="ti ti-target"></i> Ke Kuis</button></div><div class="done-card"><div class="done-emoji">🎉</div><div class="done-title">Kategori selesai!</div><div class="done-sub">Kamu sudah melihat semua ${fcCards.length} kata dalam kategori <b>${cat}</b>.<br>Sudah tahu: ${fcKnow} · Perlu ulang: ${fcReview}</div></div>`;return;
  }
  const card=fcCards[fcIdx];
  const pct=Math.round((fcIdx/fcCards.length)*100);
  body.innerHTML=`<div class="prog-info"><span>Kartu ${fcIdx+1} dari ${fcCards.length}</span><span>${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><div class="flashcard" id="fc" onclick="fcFlip()"><div class="fc-inner"><div class="fc-face fc-front"><span class="fc-emoji">${card.emoji}</span><span class="fc-word">${card.en}</span><span class="fc-pron">${card.pron}</span><span class="fc-hint">Ketuk untuk lihat arti</span></div><div class="fc-face fc-back"><span class="fc-emoji">${card.emoji}</span><span class="fc-id">${card.id}</span><span class="fc-ex">"${card.ex}"</span><span class="fc-hint">Contoh kalimat</span></div></div></div><div class="nav-row"><button class="nav-btn" onclick="fcPrev()" ${fcIdx===0?'disabled':''} aria-label="Sebelumnya"><i class="ti ti-chevron-left"></i></button><div class="act-row"><button class="act-btn btn-know" onclick="fcMark('know')"><i class="ti ti-check"></i> Tahu</button><button class="act-btn btn-review" onclick="fcMark('review')"><i class="ti ti-refresh"></i> Ulang</button></div><button class="nav-btn" onclick="fcNext()" aria-label="Berikutnya"><i class="ti ti-chevron-right"></i></button></div><div class="fc-stats"><div class="fc-stat"><div class="fc-stat-lbl">✅ Sudah tahu</div><div class="fc-stat-val">${fcKnow}</div></div><div class="fc-stat"><div class="fc-stat-lbl">🔄 Perlu ulang</div><div class="fc-stat-val">${fcReview}</div></div></div>`;
  fcFlipped=false;
}
function fcFlip(){fcFlipped=!fcFlipped;const fc=document.getElementById('fc');if(fc)fc.classList.toggle('flipped',fcFlipped)}
function fcPrev(){if(fcIdx>0){fcIdx--;renderFC()}}
function fcNext(){if(fcIdx<fcCards.length){fcIdx++;renderFC()}}
function fcMark(t){if(t==='know')fcKnow++;else fcReview++;fcIdx++;renderFC()}

/* QUIZ */
const QUIZ_LEN=infinity;
let qQ=[],qIdx=0,qScore=0,qCorrect=0,qWrong=0,qAnswered=false,qMode='EN';
function startQuiz(){qIdx=0;qScore=0;qCorrect=0;qWrong=0;qAnswered=false;buildQQ();renderQBody()}
function buildQQ(){
  const pool=shuffle([...ALL[cat]]);
  const allW=Object.values(ALL).flat();
  qQ=pool.slice(0,Math.min(QUIZ_LEN,pool.length)).map(word=>{
    const correct=qMode==='EN'?word.id:word.en;
    const dist=shuffle(allW.filter(w=>(qMode==='EN'?w.id:w.en)!==correct)).slice(0,3).map(w=>qMode==='EN'?w.id:w.en);
    return{word,correct,opts:shuffle([correct,...dist])};
  });
}
function setQMode(m){qMode=m;startQuiz()}
function renderQBody(){
  const body=document.getElementById('mainBody');
  if(qIdx>=qQ.length){renderQResult();return}
  const q=qQ[qIdx];
  const pct=Math.round((qIdx/qQ.length)*100);
  const qText=qMode==='EN'?`<span class="q-word">${q.word.en}</span><span class="q-pron">${q.word.pron}</span>`:`<span class="q-word">${q.word.id}</span>`;
  const instr=qMode==='EN'?'Apa artinya dalam bahasa Indonesia?':'Apa bahasa Inggrisnya?';
  body.innerHTML=`<div class="mode-row"><button class="mode-btn${qMode==='EN'?' active':''}" onclick="setQMode('EN')">Tebak arti 🇮🇩</button><button class="mode-btn${qMode==='ID'?' active':''}" onclick="setQMode('ID')">Tebak Inggris 🇬🇧</button></div><div class="stats-row"><div class="stat"><div class="stat-lbl">Soal</div><div class="stat-val">${qIdx+1}/${qQ.length}</div></div><div class="stat"><div class="stat-lbl">Benar</div><div class="stat-val g">${qCorrect}</div></div><div class="stat"><div class="stat-lbl">Salah</div><div class="stat-val r">${qWrong}</div></div></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><div class="q-card"><div class="q-meta"><span class="q-badge">${cat}</span><span>${instr}</span></div><span class="q-emoji">${q.word.emoji}</span>${qText}</div><div class="opts" id="opts">${q.opts.map((o,i)=>`<button class="opt" id="o${i}" onclick="qPick(${i})">${o}</button>`).join('')}</div><div id="qfeedback"></div><div id="qnext"></div>`;
  qAnswered=false;
}
function qPick(i){
  if(qAnswered)return;qAnswered=true;
  const q=qQ[qIdx];const chosen=q.opts[i];const ok=chosen===q.correct;
  q.opts.forEach((o,j)=>{const b=document.getElementById('o'+j);b.classList.add('disabled');if(o===q.correct)b.classList.add('reveal');else if(j===i&&!ok)b.classList.add('wrong');});
  if(ok){qCorrect++;qScore+=10;totalScore+=10;updateScorePill();document.getElementById('o'+i).classList.add('correct')}else qWrong++;
  const fb=document.getElementById('qfeedback');
  fb.className='feedback '+(ok?'correct':'wrong');
  fb.innerHTML=ok?`<b>Benar! +10 poin 🎉</b><br>Contoh: <i>"${q.word.ex}"</i>`:`<b>Kurang tepat.</b> Jawaban: <b>${q.correct}</b><br>Contoh: <i>"${q.word.ex}"</i>`;
  document.getElementById('qnext').innerHTML=`<button class="next-btn" onclick="qNext()" style="margin-top:10px">${qIdx===qQ.length-1?'Lihat hasil':'Soal berikutnya'} →</button>`;
}
function qNext(){qIdx++;qAnswered=false;renderQBody()}
function renderQResult(){
  const t=qQ.length,pct=Math.round((qCorrect/t)*100);
  let em,ti,msg;
  if(pct===100){em='🏆';ti='Sempurna!';msg='Luar biasa! Semua benar!'}
  else if(pct>=80){em='🎉';ti='Bagus sekali!';msg='Hampir sempurna, terus semangat!'}
  else if(pct>=60){em='👍';ti='Cukup baik!';msg='Lumayan! Latihan lagi ya.'}
  else if(pct>=40){em='📚';ti='Terus belajar!';msg='Masih banyak yang perlu dipelajari!'}
  else{em='💪';ti='Yuk coba lagi!';msg='Jangan menyerah, latihan membuat sempurna!'}
  document.getElementById('mainBody').innerHTML=`<div class="mode-row"><button class="mode-btn${qMode==='EN'?' active':''}" onclick="setQMode('EN')">Tebak arti 🇮🇩</button><button class="mode-btn${qMode==='ID'?' active':''}" onclick="setQMode('ID')">Tebak Inggris 🇬🇧</button></div><div class="result-card"><div class="res-emoji">${em}</div><div class="res-title">${ti}</div><div class="res-sub">${msg}</div><div class="res-score">${qScore}</div><div class="res-detail">poin kuis ini · ${pct}% benar</div><div class="res-grid"><div class="stat"><div class="stat-lbl">Benar</div><div class="stat-val g">${qCorrect}</div></div><div class="stat"><div class="stat-lbl">Salah</div><div class="stat-val r">${qWrong}</div></div></div><button class="res-restart" onclick="startQuiz()">Coba lagi</button></div>`;
}

renderCats();
startFlashcard();
</script>
